version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    env_file:
      - ./backend/.env
    networks:
      - genai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - genai-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    networks:
      - genai-network

  devops:
    build:
      context: ./devops
      dockerfile: Dockerfile
    networks:
      - genai-network

  scraper-service:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:5000/api/leads
      - SCRAPER_API_KEY=super-secret-scraper-key-2026
    depends_on:
      - backend
    networks:
      - genai-network

networks:
  genai-network:
    driver: bridge
